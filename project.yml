name: HowFarMuch
options:
  bundleIdPrefix: com.owenpettiford
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: Z454AW7UL3
targets:
  HowFarMuch:
    type: application
    platform: iOS
    sources:
      - path: HowFarMuch
    info:
      path: HowFarMuch/Info.plist
      properties:
        CFBundleDisplayName: How Far/Much
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        ITSAppUsesNonExemptEncryption: false
        NSHealthShareUsageDescription: >-
          How Far/Much reads your workouts from Apple Health to total up how far
          you've gone and how much you've done. Your data never leaves this device.
        NSHealthUpdateUsageDescription: >-
          How Far/Much does not write any data to Apple Health. This permission
          is never requested; the description is required because the app uses
          the HealthKit framework.
    entitlements:
      path: HowFarMuch/HowFarMuch.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.owenpettiford.HowFarMuch
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
