name: HowFarMuch
options:
  bundleIdPrefix: com.owenpettiford
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: Z454AW7UL3
    # Single source of truth for versions — both targets' Info.plists
    # reference these, so app and widget extension always match.
    MARKETING_VERSION: "2.0"
    CURRENT_PROJECT_VERSION: 10
targets:
  HowFarMuch:
    type: application
    platform: iOS
    sources:
      - path: HowFarMuch
    info:
      path: HowFarMuch/Info.plist
      properties:
        CFBundleDisplayName: How Far/Much
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        ITSAppUsesNonExemptEncryption: false
        CKSharingSupported: true
        NSHealthShareUsageDescription: >-
          How Far/Much reads your workouts from Apple Health to total up how far
          you've gone and how much you've done. Your data never leaves this device.
        NSHealthUpdateUsageDescription: >-
          How Far/Much does not write any data to Apple Health. This permission
          is never requested; the description is required because the app uses
          the HealthKit framework.
    entitlements:
      path: HowFarMuch/HowFarMuch.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.security.application-groups:
          - group.com.owenpettiford.HowFarMuch
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.owenpettiford.HowFarMuch
    dependencies:
      - target: HowFarMuchWidgets
        embed: true
    # Explicit shared scheme so the app scheme always exists after regeneration
    scheme:
      configVariants: []
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.owenpettiford.HowFarMuch
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  HowFarMuchWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: HowFarMuchWidgets
      - path: HowFarMuch/Shared
    info:
      path: HowFarMuchWidgets/Info.plist
      properties:
        CFBundleDisplayName: How Far/Much
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: HowFarMuchWidgets/HowFarMuchWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.owenpettiford.HowFarMuch
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.owenpettiford.HowFarMuch.Widgets
        SKIP_INSTALL: true
